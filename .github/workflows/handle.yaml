name: Build non-GKI kernels

on:
  workflow_call:
    inputs:
      kversion:
        description: 'Kernel versions'
        required: true
        type: string
      compiler:
        description: 'Compiler'
        required: true
        type: string
      ksu:
        description: 'KernelSU Repository'
        required: true
        type: string
      ksu_branch:
        description: 'KernelSU Branch'
        required: true
        type: string

jobs:
  build-kernel-core:
    name: Build for Kernel ${{ inputs.kversion }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Install required dependencies
      run: |
        sudo apt update -y
        sudo apt install bc cpio flex bison aptitude git python-is-python3 tar perl wget aria2 curl lz4 -y
        sudo aptitude install libssl-dev -y

    - name: Build
      run: |
        echo $(pwd)
        bash handle.sh "${{ inputs.compiler }}" "${{ inputs.kversion }}" "${{ inputs.ksu }}" "${{ inputs.ksu_branch }}"

    - name: "📤 Upload kernel"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.WORK_DIR }}/${{ env.IMAGE_NAME }}
          retention-days: 3

  Package-Kernels:
    name: "📦 Package kernels"
    runs-on: ubuntu-latest
    needs: Build-Kernel
    steps:
      - name: "📥 Download artifacts"
        uses: actions/download-artifact@v4
        with:
          path: ./kernels/

      - name: "📦 Create flashable ZIP"
        run: |
          BUILD_TIME=$(date +'%Y-%m-%d')
          git clone --depth=1 https://github.com/yougotme101/AnyKernel3 -b master AnyKernel3
          
          # Copy kernels
          find kernels -name "Image.*" -exec cp {} AnyKernel3/ \;
          
          # Create ZIP with optimization and KSU variant info
          KSU_INFO=""
          if [ "${{ github.event.inputs.buildKSU }}" != "noksu" ]; then
            KSU_INFO="_${{ github.event.inputs.ksuVariant }}"
          fi
          ZIP_NAME="Anykernel3_${{ github.event.inputs.kernelBranch }}${KSU_INFO}_${{ github.event.inputs.optimizationLevel }}_${{ github.event.inputs.tickRate }}hz_${BUILD_TIME}.zip"
          cd AnyKernel3
          zip -r9 "../$ZIP_NAME" * -x .git/*
          cd ..
          echo "ZIP_PATH=$(pwd)/$ZIP_NAME" >> $GITHUB_ENV
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: "📤 Upload final package"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_PATH }}
          retention-days: 7

      - name: "📱 Send to Telegram"
        if: always()
        run: |
          if [[ -f "${{ env.ZIP_PATH }}" ]]; then
            KSU_TEXT="";
            if [ "${{ github.event.inputs.buildKSU }}" != "noksu" ]; then
              KSU_TEXT="
          KSU Variant: ${{ github.event.inputs.ksuVariant }}";
            fi
            
            CAPTION="✅ Kernel Build Complete
          Branch: ${{ github.event.inputs.kernelBranch }}
          Optimization: -${{ github.event.inputs.optimizationLevel }}
          Tick Rate: ${{ github.event.inputs.tickRate }}Hz
          Variants: ${{ github.event.inputs.buildKSU }}${KSU_TEXT}
          Time: $(date '+%Y-%m-%d %H:%M:%S')"
            
            curl -s -F document=@"${{ env.ZIP_PATH }}" \
                 -F caption="$CAPTION" \
                 -F chat_id=${{ secrets.TELEGRAM_USER_ID }} \
                 "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument";
          else
            curl -s -X POST \
                 -d chat_id=${{ secrets.TELEGRAM_USER_ID }} \
                 -d text="❌ Kernel build failed - Optimization: -${{ github.event.inputs.optimizationLevel }}, Tick: ${{ github.event.inputs.tickRate }}Hz" \
                 "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage";
          fi
